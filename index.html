<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Generator</title>
  <style>
    :root {
      --bg: #0d1117;
      --terminal: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --green: #3fb950;
      --muted: #8b949e;
    }

    [data-theme="light"] {
      --bg: #f6f8fa;
      --terminal: #fff;
      --border: #d0d7de;
      --text: #1f2328;
      --green: #1a7f37;
      --muted: #656d76;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, Menlo, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.25s;
    }

    .terminal {
      width: 100%;
      max-width: 640px;
      background: var(--terminal);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }

    .terminal-title {
      margin: 0 auto;
      font-size: 13px;
      color: var(--muted);
    }

    #theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    #theme-toggle:hover { color: var(--text); }

    .terminal-body {
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .prompt-line {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .prompt-line .user { color: var(--green); }
    .prompt-line .path { color: #58a6ff; }

    #quote {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 12px;
      min-height: 3.2em;
    }

    #quote::after {
      content: "▊";
      color: var(--green);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    #author {
      color: var(--muted);
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #author.visible { opacity: 1; }

    #new-quote {
      background: none;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: inherit;
      font-size: 15px;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 24px;
    }

    #new-quote:hover { background: rgba(63, 185, 80, 0.12); }
    #new-quote:active { transform: scale(0.97); }

    @media (prefers-reduced-motion: reduce) {
      #quote::after { animation: none; }
      body { transition: none; }
    }
  </style>
</head>
<body>
  <main class="terminal">
    <div class="terminal-bar">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
      <span class="terminal-title">quote-generator — bash</span>
      <button id="theme-toggle" type="button">☾ dark</button>
    </div>

    <div class="terminal-body">
      <p class="prompt-line">
        <span class="user">karen@portfolio</span>:<span class="path">~</span>$ ./quotes.sh
      </p>
      <p id="quote"></p>
      <p id="author"></p>

      <button id="new-quote" type="button">$ generate</button>
    </div>
  </main>

  <script>
    const quotes = [
      { text: "Talk is cheap. Show me the code.", author: "Linus Torvalds" },
      { text: "Programs must be written for people to read, and only incidentally for machines to execute.", author: "Harold Abelson" },
      { text: "First, solve the problem. Then, write the code.", author: "John Johnson" },
      { text: "Simplicity is the soul of efficiency.", author: "Austin Freeman" },
      { text: "Any fool can write code that a computer can understand. Good programmers write code that humans can understand.", author: "Martin Fowler" }
    ];

    const quoteEl = document.getElementById("quote");
    const authorEl = document.getElementById("author");
    let timer = null;
    let lastIndex = -1;

    function randomQuote() {
      let i;
      do {
        i = Math.floor(Math.random() * quotes.length);
      } while (i === lastIndex);
      lastIndex = i;
      return quotes[i];
    }

    function typeOut(quote) {
      clearTimeout(timer);
      quoteEl.textContent = "";
      authorEl.classList.remove("visible");

      const text = '"' + quote.text + '"';
      let pos = 0;

      (function next() {
        if (pos < text.length) {
          quoteEl.textContent += text[pos++];
          timer = setTimeout(next, 25);
        } else {
          authorEl.textContent = "— " + quote.author;
          authorEl.classList.add("visible");
        }
      })();
    }

    const themeBtn = document.getElementById("theme-toggle");

    function setTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      themeBtn.textContent = theme === "dark" ? "☾ dark" : "☀ light";
      try { localStorage.setItem("theme", theme); } catch (e) {}
    }

    themeBtn.onclick = () => {
      const cur = document.documentElement.getAttribute("data-theme");
      setTheme(cur === "dark" ? "light" : "dark");
    };

    let saved = null;
    try { saved = localStorage.getItem("theme"); } catch (e) {}
    setTheme(saved || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"));

    document.getElementById("new-quote").onclick = () => typeOut(randomQuote());
    typeOut(randomQuote());
  </script>
</body>
</html>
